version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(cargo):"
    cooldown:
      default-days: 7
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(actions):"
    cooldown:
      default-days: 7
  - package-ecosystem: npm
    directory: /docs
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps(docs):"
