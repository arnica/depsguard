name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check tag matches Cargo.toml version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "::error::Tag v$TAG does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi
          echo "Tag v$TAG matches Cargo.toml version"

  build:
    name: Build (${{ matrix.label }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            label: linux-amd64-gnu
            friendly: linux-amd64-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            label: linux-amd64-musl
            friendly: linux-amd64-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            label: linux-arm64-gnu
            friendly: linux-arm64-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            label: macos-amd64
            friendly: macos-amd64
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            label: macos-arm64
            friendly: macos-arm64
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            label: windows-amd64
            friendly: windows-amd64
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../depsguard-${{ matrix.target }}.tar.gz depsguard
          cd ../../..
          sha256sum depsguard-${{ matrix.target }}.tar.gz > depsguard-${{ matrix.target }}.tar.gz.sha256
          cp depsguard-${{ matrix.target }}.tar.gz depsguard-${{ matrix.friendly }}.tar.gz
          cp depsguard-${{ matrix.target }}.tar.gz.sha256 depsguard-${{ matrix.friendly }}.tar.gz.sha256

      - name: Package (deb)
        if: contains(matrix.target, 'unknown-linux-gnu')
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-gnu) DEB_ARCH="amd64" ;;
            aarch64-unknown-linux-gnu) DEB_ARCH="arm64" ;;
            *) echo "Skipping deb packaging for target ${{ matrix.target }}"; exit 0 ;;
          esac
          PKG_ROOT="pkg/deb-${{ matrix.target }}"
          mkdir -p "${PKG_ROOT}/DEBIAN" "${PKG_ROOT}/usr/bin"
          install -m 0755 "target/${{ matrix.target }}/release/depsguard" "${PKG_ROOT}/usr/bin/depsguard"
          cat > "${PKG_ROOT}/DEBIAN/control" <<EOF
          Package: depsguard
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: ${DEB_ARCH}
          Maintainer: Arnica <engineering@arnica.io>
          Description: Harden package manager configs against supply chain attacks
          EOF
          DEB_FILE="depsguard_${VERSION}_${DEB_ARCH}.deb"
          dpkg-deb --build "${PKG_ROOT}" "${DEB_FILE}"
          sha256sum "${DEB_FILE}" > "${DEB_FILE}.sha256"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../depsguard-${{ matrix.target }}.zip depsguard.exe
          cd ../../..
          sha256sum depsguard-${{ matrix.target }}.zip > depsguard-${{ matrix.target }}.zip.sha256
          cp depsguard-${{ matrix.target }}.zip depsguard-${{ matrix.friendly }}.zip
          cp depsguard-${{ matrix.target }}.zip.sha256 depsguard-${{ matrix.friendly }}.zip.sha256

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: depsguard-${{ matrix.target }}
          path: |
            depsguard-${{ matrix.target }}.*
            depsguard_*.deb*
          retention-days: 1

  publish-github:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          merge-multiple: true
          path: artifacts
      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          draft: false
          generate_release_notes: true
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-crates:
    name: Publish to crates.io
    needs: validate
    if: ${{ secrets.CARGO_REGISTRY_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

  publish-homebrew-tap:
    name: Bump Homebrew tap
    needs: publish-github
    if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install gettext (envsubst)
        run: sudo apt-get update -qq && sudo apt-get install -y gettext-base
      - name: Push updated formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          HOMEBREW_TAP: arnica/homebrew-depsguard
          REPO_HOMEPAGE: https://arnica.github.io/depsguard
        run: bash scripts/release/publish-homebrew-tap.sh

  publish-scoop-bucket:
    name: Bump Scoop bucket
    needs: publish-github
    if: ${{ secrets.SCOOP_BUCKET_TOKEN != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install gettext (envsubst)
        run: sudo apt-get update -qq && sudo apt-get install -y gettext-base
      - name: Push updated manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          SCOOP_BUCKET: ${{ github.repository_owner }}/scoop-depsguard
          REPO_HOMEPAGE: https://arnica.github.io/depsguard
        run: bash scripts/release/publish-scoop-bucket.sh

  publish-winget:
    name: WinGet community PR
    needs: publish-github
    if: ${{ secrets.WINGET_PKGS_TOKEN != '' }}
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: vedantmgoyal9/winget-releaser@4ffc7888bffd451b357355dc214d43bb9f23917e # v2
        with:
          identifier: Arnica.DepsGuard
          installers-regex: ^depsguard-x86_64-pc-windows-msvc\.zip$
          token: ${{ secrets.WINGET_PKGS_TOKEN }}
          fork-user: ${{ github.repository_owner }}
