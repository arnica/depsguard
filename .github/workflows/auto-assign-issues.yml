name: Auto Assign Issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  auto-assign:
    name: Assign to depsguard-maintainers
    runs-on: ubuntu-latest
    steps:
      # owner-scoped token so the App's org Members:read perm resolves team membership
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ vars.ASSIGN_BOT_APP_ID }}
          private-key: ${{ secrets.ASSIGN_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - uses: pozil/auto-assign-issue@af6beea6bdf1e8eb373f061c5bc168681fc6d011 # v4.0.1
        with:
          repo-token: ${{ steps.app-token.outputs.token }}
          teams: depsguard-maintainers
          allowNoAssignees: true
