name: Dev Release

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: ""
            label: linux-amd64
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            label: macos-amd64
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            label: macos-arm64
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            label: windows-amd64
            os: windows-latest
            archive: zip
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build
        shell: bash
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            cargo build --release --target "${{ matrix.target }}"
          else
            cargo build --release
          fi

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            BIN_DIR="target/${{ matrix.target }}/release"
          else
            BIN_DIR="target/release"
          fi
          tar czf "depsguard-${{ matrix.label }}.tar.gz" -C "$BIN_DIR" depsguard
          sha256sum depsguard-${{ matrix.label }}.tar.gz > depsguard-${{ matrix.label }}.tar.gz.sha256

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          7z a "depsguard-${{ matrix.label }}.zip" "target/${{ matrix.target }}/release/depsguard.exe"
          sha256sum depsguard-${{ matrix.label }}.zip > depsguard-${{ matrix.label }}.zip.sha256

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: depsguard-${{ matrix.label }}
          path: |
            depsguard-${{ matrix.label }}.*
          retention-days: 1

  publish-crates-dev:
    name: Publish dev crate (temporary)
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - name: Skip publish when token is missing
        if: ${{ env.CARGO_REGISTRY_TOKEN == '' }}
        run: echo "CARGO_REGISTRY_TOKEN is not set; skipping dev crate publish."
      - name: Set unique dev version
        if: ${{ env.CARGO_REGISTRY_TOKEN != '' }}
        shell: bash
        env:
          RUN_NO: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          BASE_VERSION="$(python3 - <<'PY'
          import tomllib
          with open("Cargo.toml", "rb") as f:
              print(tomllib.load(f)["package"]["version"])
          PY
          )"
          if [[ "$BASE_VERSION" == *-* ]]; then
            DEV_VERSION="${BASE_VERSION}.dev.${RUN_NO}.${RUN_ATTEMPT}"
          else
            DEV_VERSION="${BASE_VERSION}-dev.${RUN_NO}.${RUN_ATTEMPT}"
          fi
          python3 - <<PY
          from pathlib import Path
          import re
          dev = "${DEV_VERSION}"
          p = Path("Cargo.toml")
          t = p.read_text()
          t2 = re.sub(r'(?m)^version\\s*=\\s*\"[^\"]+\"', f'version = \"{dev}\"', t, count=1)
          if t == t2:
              raise SystemExit("failed to update Cargo.toml version")
          p.write_text(t2)
          print(f"Using dev crate version: {dev}")
          PY
      - name: Publish to crates.io
        if: ${{ env.CARGO_REGISTRY_TOKEN != '' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ env.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

  publish:
    name: Publish prerelease
    needs: [build, publish-crates-dev]
    if: ${{ always() && needs.build.result == 'success' && needs.publish-crates-dev.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          merge-multiple: true
          path: artifacts
      - name: Prepare tag metadata
        id: meta
        env:
          REF_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          BRANCH_SLUG="$(echo "$REF_NAME" | tr '/_' '-' | tr -cd '[:alnum:]-.' | cut -c1-40)"
          SHORT_SHA="${COMMIT_SHA::8}"
          echo "branch_slug=$BRANCH_SLUG" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
      - name: Create or update prerelease
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG_NAME: dev-${{ steps.meta.outputs.branch_slug }}
          RELEASE_NAME: dev/${{ github.ref_name }} (${{ steps.meta.outputs.short_sha }})
          NOTES: |
            Automated dev build for branch `${{ github.ref_name }}`.

            Commit: `${{ github.sha }}`
            Workflow run: `${{ github.run_id }}`
        run: |
          if gh release view "$TAG_NAME" -R "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" artifacts/* -R "$REPO" --clobber
            gh release edit "$TAG_NAME" -R "$REPO" --title "$RELEASE_NAME" --prerelease --latest=false --notes "$NOTES"
          else
            gh release create "$TAG_NAME" artifacts/* -R "$REPO" --target "${GITHUB_SHA}" --title "$RELEASE_NAME" --prerelease --latest=false --notes "$NOTES"
          fi
